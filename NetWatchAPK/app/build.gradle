plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.netwatch.app'

    defaultConfig {
        applicationId "com.netwatch.app"
        minSdk 30
        targetSdk 34
        versionCode 29
        versionName "1.4.4"
    }

    signingConfigs {
        release {
            storeFile     file("../netwatch-release.keystore")
            storePassword "netwatch2024"
            keyAlias      "netwatch"
            keyPassword   "netwatch2024"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            debuggable true
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
